{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sri Krishnanugraha Idol Shop</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

  <style>
    .navbar {
      margin-bottom: 50px;
      border-radius: 0;
      font-family: 'Times New Roman', Times, serif;
      font-size: medium;
      text-transform: uppercase;
    }

    .carousel-caption {
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      text-shadow: 10px 10px 10px black;
    }

    .carousel-inner img {
      width: 100%;
      margin: auto;
      max-height: 450px;
    }

    footer {
      background-color: #f2f2f2;
      padding: 25px;
    }

    .panel-body:hover {
      box-shadow: 10px 10px 10px rgb(16, 11, 21);
      transform: scale(1.05);
    }

    .p1 {
      color: black;
    }
  </style>
</head>

<body style="background-image: url({% static 'back5.jpg' %});">

<!-- CAROUSEL -->
<div id="myCarousel" class="carousel slide" data-ride="carousel">

  <ol class="carousel-indicators">
    <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
    <li data-target="#myCarousel" data-slide-to="1"></li>
    <li data-target="#myCarousel" data-slide-to="2"></li>
    <li data-target="#myCarousel" data-slide-to="3"></li>
  </ol>

  <div class="carousel-inner">

    <div class="item active">
      <img src="{% static 'backhd1.jpg' %}">
    </div>

    <div class="item">
      <img src="{% static 'backhd2.avif' %}">
    </div>

    <div class="item">
      <img src="{% static 'backhd3.jpg' %}">
    </div>

    <div class="item">
      <img src="{% static 'backhd4.jpg' %}">
    </div>

  </div>

  <a class="left carousel-control" href="#myCarousel" data-slide="prev">
    <span class="glyphicon glyphicon-chevron-left"></span>
  </a>

  <a class="right carousel-control" href="#myCarousel" data-slide="next">
    <span class="glyphicon glyphicon-chevron-right"></span>
  </a>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-inverse">
  <div class="container-fluid">

    <div class="navbar-header">
      <a class="navbar-brand" href="#">Idol Shop</a>
    </div>

    <ul class="nav navbar-nav">
      <li class="active"><a href="/">Home</a></li>
      <li><a href="/customer/product/">Products</a></li>
      <li><a href="/customer/about/">About</a></li>
      <li><a href="/customer/contact/">Contact</a></li>
    </ul>

    <ul class="nav navbar-nav navbar-right">
      <li><a href="#">Guest</a></li>
      <li><a href="/customer/cart/">Cart</a></li>
      <li><a href="/customer/logout/">Logout</a></li>
    </ul>

  </div>
</nav>

<!-- CONTENT (KEEP YOUR ORIGINAL SECTIONS HERE IF NEEDED) -->
<div class="container">
  <h2 style="text-align:center;">Welcome to Sri Krishnanugraha Idol Shop</h2>
</div>

<!-- FOOTER -->
<footer class="container-fluid text-center">
  <p class="p1">&copy; 2024 Sri Krishnanugraha. All rights reserved.</p>
</footer>

</body>
</html>
