{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Products</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

  <style>
    body {
      background-attachment: fixed;
      background-size: cover;
    }

    .product {
      background: #fff;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .product:hover {
      transform: scale(1.03);
    }

    .product img {
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body style="background-image: url({% static 'back5.jpg' %});">

<!-- NAVBAR -->
<nav class="navbar navbar-inverse">
  <div class="container-fluid">

    <div class="navbar-header">
      <a class="navbar-brand" href="{% url 'home' %}">Idol Shop</a>
    </div>

    <ul class="nav navbar-nav">
      <li><a href="{% url 'home' %}">Home</a></li>
      <li class="active"><a href="{% url 'product' %}">Products</a></li>
      <li><a href="{% url 'about' %}">About</a></li>
      <li><a href="{% url 'contact' %}">Contact</a></li>
    </ul>

    <ul class="nav navbar-nav navbar-right">
      <li><a href="{% url 'cart' %}">Cart</a></li>
      <li><a href="{% url 'logout' %}">Logout</a></li>
    </ul>

  </div>
</nav>

<!-- PRODUCTS -->
<div class="container">
  <h2 class="text-center">Our Products</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="product">
        <img src="{% static 'ga.jpg' %}">
        <h4>Lord Ganesha</h4>
        <p>₹1500</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="product">
        <img src="{% static 'lakshmi.jpg' %}">
        <h4>Goddess Lakshmi</h4>
        <p>₹1300</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="product">
        <img src="{% static 'shiva.jpg' %}">
        <h4>Lord Shiva</h4>
        <p>₹1000</p>
      </div>
    </div>

  </div>
</div>

</body>
</html>
